<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cannatoria OS | V5 Pipeline</title>
    <style>
        :root { 
            --green: #00897b; --bg: #0a0a0a; --card: #141414; --text: #fff; --sub: #888; --border: #222; 
            --color-prop: #00b4d8; --color-veg: #00e676; --color-flower: #ff9800; --warning: #ffcc00; --danger: #ff3b30;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; }
        
        .header { padding: 40px 20px 20px; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .logo-mark { display: inline-block; width: 14px; height: 14px; background: var(--green); margin-right: 8px; vertical-align: middle; }
        .title { font-size: 20px; font-weight: 800; margin: 0; }
        .logout-btn { display: none; color: var(--sub); font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: 1px solid var(--sub); padding: 4px 8px; border-radius: 4px; }
        
        .view { display: none; padding: 20px; padding-bottom: 80px; }
        .view.active { display: block; }

        /* Inputs & Buttons */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; box-sizing: border-box; background: var(--card); border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 8px; font-size: 16px; outline: none; }
        .btn { width: 100%; background: var(--green); color: #fff; border: none; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; margin-top: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-action { width: 100%; padding: 12px; font-size: 12px; font-weight: bold; border-radius: 6px; margin-top: 10px; border: none; cursor: pointer; text-transform: uppercase; }

        /* Cards & UI */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 12px 0; }
        .flex-row:last-child { border: none; padding-bottom: 0; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; color: #000; }
        
        /* Master Pipeline Visuals */
        .pipeline-tracker { margin-top: 15px; background: #0a0a0a; border-radius: 8px; padding: 15px; border: 1px solid #222; }
        .step-container { display: flex; justify-content: space-between; position: relative; margin-bottom: 10px; }
        .step-line { position: absolute; top: 8px; left: 10px; right: 10px; height: 2px; background: #333; z-index: 1; }
        .step-dot { width: 16px; height: 16px; border-radius: 50%; background: #333; position: relative; z-index: 2; border: 3px solid #0a0a0a; }
        .step-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .step-dot.past { background: var(--sub); }
        .step-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--sub); text-transform: uppercase; text-align: center; }
        .step-label-box { width: 25%; }
        .exact-date { font-family: monospace; font-size: 10px; color: #fff; margin-top: 2px; display: block; }

        /* IoT Hardware Module */
        .iot-module { background: #050505; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-top: 10px; }
        .iot-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--color-prop); text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .iot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .iot-readout { background: #111; padding: 8px; border-radius: 4px; text-align: center; font-family: monospace; font-size: 14px; color: #555; }
        .iot-label { font-size: 9px; color: #666; font-family: -apple-system, sans-serif; display: block; margin-bottom: 2px; }
        .iot-status { font-size: 9px; text-align: center; margin-top: 8px; color: #666; font-style: italic; }

    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 class="title"><span class="logo-mark"></span>Cannatoria OS</h1>
            <div id="header-subtitle" style="font-size: 11px; color: var(--sub); text-transform: uppercase; margin-top: 4px;">Authentication</div>
        </div>
        <div class="logout-btn" id="logoutBtn" onclick="logout()">Logout</div>
    </div>

    <div id="view-login" class="view active">
        <div class="login-box" style="margin-top: 60px;">
            <h2 style="margin-top: 0; margin-bottom: 5px;">System Access</h2>
            <div class="input-group"><label>Username</label><input type="text" id="username" autocapitalize="none"></div>
            <div class="input-group"><label>Security Key</label><input type="password" id="password"></div>
            <button class="btn" onclick="attemptLogin()">Authenticate</button>
            <div id="login-error" style="color: #ff3b30; font-size: 12px; margin-top: 10px; display: none; text-align: center;">Invalid credentials.</div>
            <button onclick="resetData()" style="margin-top: 40px; background: none; border: none; color: #444; font-size: 10px; text-decoration: underline; width: 100%;">Reset Database (Pitch Prep)</button>
        </div>
    </div>

    <div id="view-owner" class="view">
        <div class="card" style="border-left: 4px solid var(--green);">
            <div style="font-size: 12px; color: var(--sub); text-transform: uppercase; margin-bottom: 5px;">Transparency Protocol</div>
            <div style="font-size: 20px; font-weight: bold;">Master Facility Roadmap</div>
            <div style="font-size: 12px; color: var(--sub); margin-top: 5px;">Every batch timeline locked to exact calendar dates.</div>
        </div>

        <div id="owner-pipeline-list"></div>
    </div>

    <div id="view-tech" class="view">
        <h3 style="font-size: 14px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Live Telemetry & Execution</h3>
        
        <div id="tech-rooms-list"></div>
        <button class="btn" style="background: transparent; border: 1px dashed var(--color-prop); color: var(--color-prop);" onclick="spawnClones()">+ Log New Clone Batch (Initialize Timeline)</button>
    </div>

    <script>
        // --- CALENDAR ENGINE (ANCHORED TODAY) ---
        const systemDate = new Date(); // Uses today's real date dynamically
        
        function formatDate(dateObj) { 
            return new Date(dateObj).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); 
        }
        
        function addDays(dateObj, days) {
            let d = new Date(dateObj);
            d.setDate(d.getDate() + days);
            return d;
        }

        function getDaysBetween(targetDate) { 
            return Math.ceil((new Date(targetDate) - systemDate) / (1000 * 60 * 60 * 24)); 
        }

        // --- DATABASE ---
        // We generate realistic exact dates backward and forward from TODAY.
        let db = {
            currentUser: null,
            nextBatchNum: 9,
            rooms: [
                { id: "f1", name: "Flower 1", batch: "B-01", type: "flower", plants: 350, color: "var(--color-flower)", startDate: addDays(systemDate, -60) },
                { id: "f2", name: "Flower 2", batch: "B-02", type: "flower", plants: 380, color: "var(--color-flower)", startDate: addDays(systemDate, -46) },
                { id: "f3", name: "Flower 3", batch: "B-03", type: "flower", plants: 400, color: "var(--color-flower)", startDate: addDays(systemDate, -32) },
                { id: "f4", name: "Flower 4", batch: "B-04", type: "flower", plants: 420, color: "var(--color-flower)", startDate: addDays(systemDate, -18) },
                { id: "f5", name: "Flower 5", batch: "B-05", type: "flower", plants: 390, color: "var(--color-flower)", startDate: addDays(systemDate, -4) },
                { id: "vA", name: "Veg Space A", batch: "B-06", type: "veg", plants: 400, color: "var(--color-veg)", startDate: addDays(systemDate, -24) },
                { id: "vB", name: "Veg Space B", batch: "B-07", type: "veg", plants: 410, color: "var(--color-veg)", startDate: addDays(systemDate, -10) },
                { id: "prop", name: "Propagation", batch: "B-08", type: "prop", plants: 450, color: "var(--color-prop)", startDate: addDays(systemDate, -4) }
            ]
        };

        function initApp() {
            const saved = localStorage.getItem('cannatoriaV5');
            if (saved) { 
                db = JSON.parse(saved); 
                // Rehydrate dates
                db.rooms.forEach(r => { if(r.startDate) r.startDate = new Date(r.startDate); });
            }
            if (db.currentUser === 'boss') { routeOwner(); }
            else if (db.currentUser === 'crew') { routeTech(); }
            else { showView('login', 'Authentication'); }
        }

        function saveData() { localStorage.setItem('cannatoriaV5', JSON.stringify(db)); }
        function resetData() { localStorage.removeItem('cannatoriaV5'); alert("Reset Complete."); location.reload(); }

        // --- AUTH ---
        function attemptLogin() {
            const user = document.getElementById('username').value.toLowerCase();
            const pass = document.getElementById('password').value.toLowerCase();
            if (user === 'boss' && pass === 'roi') { db.currentUser = 'boss'; saveData(); routeOwner(); }
            else if (user === 'crew' && pass === '1gw') { db.currentUser = 'crew'; saveData(); routeTech(); }
            else { document.getElementById('login-error').style.display = 'block'; }
        }

        function logout() {
            db.currentUser = null; saveData();
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-login').classList.add('active');
            document.getElementById('header-subtitle').innerText = 'Authentication';
            document.getElementById('logoutBtn').style.display = 'none';
        }

        function showView(viewId, title) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('header-subtitle').innerText = title;
            if(viewId !== 'login') document.getElementById('logoutBtn').style.display = 'block';
        }

        function routeOwner() { renderOwner(); showView('owner', 'Master Roadmap'); }
        function routeTech() { renderTech(); showView('tech', 'Flight Crew Command'); }

        // --- PIPELINE LOGIC (The Visual Roadmap) ---
        function buildPipelineHTML(room) {
            if (!room.batch) return `<div style="color: #555; font-size: 12px; font-style: italic; margin-top: 10px;">Room cleared. Awaiting rotation.</div>`;

            // Calculate absolute dates based on the batch's origin startDate
            let dateClone = room.startDate;
            let dateVeg = addDays(dateClone, 14);
            let dateFlower = addDays(dateVeg, 28);
            let dateHarvest = addDays(dateFlower, 70);

            // Determine current phase
            let now = systemDate;
            let p1 = 'past', p2 = '', p3 = '', p4 = '';
            
            if (now >= dateVeg) p2 = 'past';
            if (now >= dateFlower) p3 = 'past';
            
            if (room.type === 'prop') { p1 = 'active'; p2 = ''; }
            if (room.type === 'veg') { p1 = 'past'; p2 = 'active'; }
            if (room.type === 'flower') { p1 = 'past'; p2 = 'past'; p3 = 'active'; }

            let targetHarvestDays = getDaysBetween(dateHarvest);
            let alertText = targetHarvestDays <= 14 ? `<span style="color: var(--warning);">Harvest Prep Active</span>` : `${targetHarvestDays} Days to Harvest`;

            return `
                <div class="flex-row" style="border:none; padding-bottom: 5px;">
                    <span class="badge" style="background: ${room.color};">${room.batch}</span>
                    <span style="font-family: monospace; font-size: 12px; font-weight: bold;">${alertText}</span>
                </div>
                
                <div class="pipeline-tracker">
                    <div class="step-container">
                        <div class="step-line"></div>
                        <div class="step-dot ${p1}"></div>
                        <div class="step-dot ${p2}"></div>
                        <div class="step-dot ${p3}"></div>
                        <div class="step-dot ${p4}"></div>
                    </div>
                    <div class="step-labels">
                        <div class="step-label-box">Cloned<br><span class="exact-date">${formatDate(dateClone)}</span></div>
                        <div class="step-label-box">Veg Flip<br><span class="exact-date">${formatDate(dateVeg)}</span></div>
                        <div class="step-label-box">Flower<br><span class="exact-date">${formatDate(dateFlower)}</span></div>
                        <div class="step-label-box" style="color: var(--green);">Harvest<br><span class="exact-date" style="color: var(--green);">${formatDate(dateHarvest)}</span></div>
                    </div>
                </div>
            `;
        }

        // --- OWNER DASHBOARD ---
        function renderOwner() {
            let html = '';
            db.rooms.forEach(r => {
                if(r.batch) {
                    html += `
                    <div class="card" style="border-left: 3px solid ${r.color};">
                        <div style="font-weight: bold; font-size: 16px; color: ${r.color};">${r.name} <span style="font-size:12px; color:var(--sub); font-weight:normal;">(${r.plants} Plants)</span></div>
                        ${buildPipelineHTML(r)}
                    </div>`;
                }
            });
            document.getElementById('owner-pipeline-list').innerHTML = html;
        }

        // --- CONSULTANT DASHBOARD ---
        function renderTech() {
            let html = '';
            db.rooms.forEach(r => {
                html += `<div class="card" style="border-top: 3px solid ${r.batch ? r.color : '#333'};">
                    <div class="flex-row" style="border:none; padding:0; margin-bottom:5px;">
                        <div style="font-weight:bold; font-size:16px; color: ${r.batch ? r.color : '#555'};">${r.name}</div>
                        ${r.batch ? `<div style="font-size:12px; color:var(--sub);">${r.plants} Plants</div>` : ''}
                    </div>`;
                
                if (r.batch) {
                    html += buildPipelineHTML(r);
                    
                    // Hardware IoT Placeholder (Only for Flower and Veg)
                    if (r.type === 'flower' || r.type === 'veg') {
                        html += `
                        <div class="iot-module">
                            <div class="iot-header"><span>⟡ IoT Sensor Link</span> <span>[Offline]</span></div>
                            <div class="iot-grid">
                                <div class="iot-readout"><span class="iot-label">Substrate EC</span>-- mS</div>
                                <div class="iot-readout"><span class="iot-label">Canopy VPD</span>-- kPa</div>
                            </div>
                            <div class="iot-status">Awaiting Phase 2 Hardware Module Installation</div>
                        </div>`;
                    }

                    let daysToNextPhase = 0;
                    let actionText = "";
                    let nextAction = "";
                    
                    if (r.type === 'flower') {
                        daysToNextPhase = getDaysBetween(addDays(r.startDate, 112)); // 14 + 28 + 70
                        actionText = "Log Harvest Weight & Clear Room";
                        nextAction = `harvestRoom('${r.id}')`;
                    } else if (r.type === 'veg') {
                        daysToNextPhase = getDaysBetween(addDays(r.startDate, 42)); // 14 + 28
                        actionText = "Execute Flower Flip";
                        nextAction = `moveBatch('${r.id}', 'flower')`;
                    } else if (r.type === 'prop') {
                        daysToNextPhase = getDaysBetween(addDays(r.startDate, 14)); // 14
                        actionText = "Transfer to Veg Space";
                        nextAction = `moveBatch('${r.id}', 'veg')`;
                    }

                    let isReady = daysToNextPhase <= 0;
                    html += `<button class="btn-action" style="background: ${isReady ? 'var(--green)' : '#333'}; color: ${isReady ? '#000' : '#888'};" onclick="${nextAction}">${actionText}</button>`;
                    
                } else {
                    html += `<div style="color: #555; font-size: 12px; font-style: italic;">Cleaned. Awaiting next cycle.</div>`;
                }
                html += `</div>`;
            });
            document.getElementById('tech-rooms-list').innerHTML = html;
        }

        // --- HEARTBEAT SYSTEM ACTIONS ---
        function harvestRoom(roomId) {
            let weight = prompt(`Final Dry Weight (KG):`, "42.5");
            if (weight && !isNaN(weight)) {
                let room = db.rooms.find(r => r.id === roomId);
                room.batch = null; room.startDate = null; room.plants = 0;
                saveData(); renderTech();
            }
        }

        function moveBatch(fromRoomId, targetType) {
            let fromRoom = db.rooms.find(r => r.id === fromRoomId);
            let emptyTarget = db.rooms.find(r => r.type === targetType && !r.batch);
            
            if (!emptyTarget) { alert(`All ${targetType.toUpperCase()} rooms are full.`); return; }
            
            emptyTarget.batch = fromRoom.batch; 
            emptyTarget.plants = fromRoom.plants;
            // The magic: We carry the ORIGINAL START DATE to the new room so the timeline stays perfectly intact.
            emptyTarget.startDate = fromRoom.startDate; 
            
            fromRoom.batch = null; fromRoom.startDate = null; fromRoom.plants = 0;
            saveData(); renderTech();
        }

        function spawnClones() {
            let propRoom = db.rooms.find(r => r.type === 'prop');
            if (propRoom.batch) { alert("Propagation is full."); return; }
            
            let pCount = prompt("Enter Plant Count:", "350");
            if(!pCount || isNaN(pCount)) return;

            propRoom.batch = "B-" + (db.nextBatchNum < 10 ? "0" + db.nextBatchNum : db.nextBatchNum);
            propRoom.plants = parseInt(pCount); 
            propRoom.startDate = new Date(); // Locks to TODAY
            db.nextBatchNum++;
            
            saveData(); renderTech();
        }

        window.onload = initApp;
    </script>
</body>
</html>
